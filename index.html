<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visit Counter</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      color: #e0e7ff;
    }

    #stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    .counter {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 800;
      color: #e0e7ff;
      text-shadow:
        0 0 20px rgba(129, 140, 248, 0.6),
        0 0 40px rgba(129, 140, 248, 0.4),
        0 0 80px rgba(129, 140, 248, 0.2);
      cursor: pointer;
      transition: text-shadow 0.3s ease;
      font-variant-numeric: tabular-nums;
    }

    .counter:hover {
      text-shadow:
        0 0 30px rgba(129, 140, 248, 0.8),
        0 0 60px rgba(129, 140, 248, 0.5),
        0 0 100px rgba(129, 140, 248, 0.3);
    }

    .visitor-msg {
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      color: rgba(165, 180, 252, 0.6);
      margin-top: 1rem;
      letter-spacing: 0.05em;
    }

    .breakdown {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, opacity 0.4s ease;
      opacity: 0;
      font-size: clamp(0.8rem, 2vw, 1rem);
      color: rgba(165, 180, 252, 0.45);
      margin-top: 0.5rem;
    }

    .breakdown.visible {
      max-height: 3rem;
      opacity: 1;
    }

    .counter.loading {
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.7; }
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <div class="container">
    <div class="counter loading" id="counter">...</div>
    <div class="visitor-msg" id="visitor-msg"></div>
    <div class="breakdown" id="breakdown"></div>
  </div>

  <script>
    // Star Particles
    (function initStars() {
      const canvas = document.getElementById('stars');
      const ctx = canvas.getContext('2d');
      let stars = [];
      const STAR_COUNT = 200;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function createStars() {
        stars = [];
        for (let i = 0; i < STAR_COUNT; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            radius: Math.random() * 1.5 + 0.5,
            speed: Math.random() * 0.3 + 0.1,
            twinkleSpeed: Math.random() * 0.02 + 0.005,
            twinkleOffset: Math.random() * Math.PI * 2,
          });
        }
      }

      function draw(time) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const star of stars) {
          const opacity = 0.4 + 0.6 * Math.sin(time * star.twinkleSpeed + star.twinkleOffset);
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(224, 231, 255, ${opacity})`;
          ctx.fill();
          star.y -= star.speed;
          if (star.y < -star.radius) {
            star.y = canvas.height + star.radius;
            star.x = Math.random() * canvas.width;
          }
        }
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', () => { resize(); createStars(); });
      resize();
      createStars();
      requestAnimationFrame(draw);
    })();

    // Counter Animation
    function animateCounter(element, target, duration) {
      const start = performance.now();
      const format = (n) => n.toLocaleString('en-US');

      function step(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = Math.round(eased * target);
        element.textContent = format(current);
        if (progress < 1) {
          requestAnimationFrame(step);
        }
      }

      requestAnimationFrame(step);
    }

    // Bot Detection
    function detectBot() {
      return new Promise((resolve) => {
        const ua = navigator.userAgent.toLowerCase();
        const botPatterns = [
          'bot', 'crawl', 'spider', 'slurp', 'ia_archiver',
          'facebookexternalhit', 'twitterbot', 'linkedinbot',
          'whatsapp', 'telegrambot', 'googlebot', 'bingbot',
          'yandexbot', 'baiduspider', 'duckduckbot', 'semrush',
          'ahrefs', 'mj12bot', 'dotbot', 'petalbot',
        ];
        if (botPatterns.some((p) => ua.includes(p))) {
          resolve(true);
          return;
        }

        let isHuman = false;
        const events = ['mousemove', 'touchstart', 'scroll', 'keydown'];

        function onInteraction() {
          isHuman = true;
          events.forEach((e) => window.removeEventListener(e, onInteraction));
        }

        events.forEach((e) => window.addEventListener(e, onInteraction, { once: true }));

        setTimeout(() => {
          events.forEach((e) => window.removeEventListener(e, onInteraction));
          resolve(!isHuman);
        }, 3000);
      });
    }

    // Supabase Init + Main Flow
    const SUPABASE_URL = 'https://brcnwdccnmxlmkqkgxke.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyY253ZGNjbm14bG1rcWtneGtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzI0OTcsImV4cCI6MjA5MjgwODQ5N30.TDUMLZurGP4HEbkubgsfoVUVTfL6gRC3JexFggghFk8';

    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    (async function main() {
      const counterEl = document.getElementById('counter');
      const visitorMsg = document.getElementById('visitor-msg');
      const breakdownEl = document.getElementById('breakdown');

      // Check UA immediately — if bot, send right away
      const ua = navigator.userAgent.toLowerCase();
      const botPatterns = [
        'bot', 'crawl', 'spider', 'slurp', 'ia_archiver',
        'facebookexternalhit', 'twitterbot', 'linkedinbot',
        'whatsapp', 'telegrambot', 'googlebot', 'bingbot',
        'yandexbot', 'baiduspider', 'duckduckbot', 'semrush',
        'ahrefs', 'mj12bot', 'dotbot', 'petalbot',
      ];
      const isUaBot = botPatterns.some((p) => ua.includes(p));

      // Fire RPC immediately (assume human unless UA says bot)
      const { data, error } = await db.rpc('increment_visits', { is_bot: isUaBot });

      if (error) {
        console.error('Supabase error:', error);
        counterEl.textContent = ':(';
        counterEl.classList.remove('loading');
        visitorMsg.textContent = 'Could not load visit count';
        return;
      }

      const totalCount = data.count;
      const botCount = data.bots;
      const peopleCount = totalCount - botCount;

      counterEl.classList.remove('loading');
      animateCounter(counterEl, totalCount, 2000);

      setTimeout(() => {
        visitorMsg.textContent = `You are visitor #${totalCount.toLocaleString('en-US')}`;
      }, 2100);

      breakdownEl.textContent = `People: ${peopleCount.toLocaleString('en-US')} \u00b7 Bots: ${botCount.toLocaleString('en-US')}`;

      // If UA was clean, run behavioral check in background
      // and correct the bot count if no interaction detected
      if (!isUaBot) {
        const isBot = await detectBot();
        if (isBot) {
          // Correct: increment bots count (visit already counted)
          await db.rpc('increment_bots_only');
          breakdownEl.textContent = `People: ${(peopleCount - 1).toLocaleString('en-US')} \u00b7 Bots: ${(botCount + 1).toLocaleString('en-US')}`;
        }
      }
    })();

    // Breakdown Reveal
    (function initBreakdown() {
      const container = document.querySelector('.container');
      const breakdown = document.getElementById('breakdown');

      container.addEventListener('mouseenter', () => {
        breakdown.classList.add('visible');
      });
      container.addEventListener('mouseleave', () => {
        breakdown.classList.remove('visible');
      });

      container.addEventListener('click', () => {
        breakdown.classList.toggle('visible');
      });
    })();
  </script>
</body>
</html>
